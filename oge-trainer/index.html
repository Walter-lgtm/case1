<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OGE-HEISENBERG v1.0</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #151515;
            --accent: #00f2ff;
            --correct: #39ff14;
            --wrong: #ff4444;
            --text: #e0e0e0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .app-container { width: 100%; max-width: 600px; }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--accent); text-shadow: 0 0 10px var(--accent); margin: 0; }

        .card {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .q-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 15px; white-space: pre-wrap; }
        
        /* Стилизация под бланк ОГЭ */
        .oge-input-container {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 20px 0;
        }

        .oge-cell {
            width: 40px;
            height: 50px;
            background: #222;
            border: 2px solid #444;
            border-radius: 4px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
        }

        .oge-cell:focus { border-color: var(--accent); outline: none; background: #2a2a2a; }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-primary:hover { background: var(--accent); color: #000; }
        
        .hidden { display: none; }
        .explanation { border-left: 4px solid var(--accent); padding-left: 15px; background: #1a1a2e; margin-top: 15px; font-size: 0.9rem; }
        
        .result-score { font-size: 4rem; color: var(--correct); text-shadow: 0 0 20px var(--correct); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>OGE <span style="font-weight:100">CHEMISTRY</span></h1>
            <p id="progress-text">Тренажер 10 типов</p>
        </div>

        <!-- Меню -->
        <div id="menu" class="card">
            <p>Готов к тренировке? Мы собрали 50 заданий (10 типов по 5 вариантов). Система будет выдавать случайный вариант.</p>
            <button class="btn btn-primary" onclick="startApp()">Начать экзамен</button>
        </div>

        <!-- Тренажер -->
        <div id="quiz" class="hidden">
            <div class="card">
                <div id="question-text" class="q-text"></div>
                <div id="image-container"></div>
                
                <div class="oge-input-container" id="input-fields">
                    <!-- Клетки генерируются JS -->
                </div>

                <button id="btn-check" class="btn btn-primary">Проверить</button>
                <div id="expl-box" class="explanation hidden"></div>
                <button id="btn-next" class="btn btn-primary hidden">Далее</button>
            </div>
        </div>

        <!-- Результат -->
        <div id="result" class="hidden">
            <div class="card" style="text-align:center">
                <h2>Ваш результат:</h2>
                <div id="final-score" class="result-score">0/10</div>
                <p id="feedback"></p>
                <button class="btn btn-primary" onclick="location.reload()">В меню</button>
            </div>
        </div>
    </div>

            type: 10,
            variants: [
                { q: "Установите соответствие между веществом и реагентами:\nА) S, Б) SO3, В) Ba(OH)2\n1) HCl, CuCl2\n2) H2SO4(р-р), Mg\n3) KOH, H2O\n4) HNO3, O2", a: "431", h: "Сера окисляется азоткой и кислородом, SO3 реагирует с водой и щелочью, Ba(OH)2 — с кислотой и солью (осадок)." },
                { q: "Установите соответствие между веществом и реагентами:\nА) Zn, Б) C, В) KOH\n1) HCl, CuSO4\n2) CO2, AlCl3\n3) O2, CuO\n4) H2O, NaCl", a: "132", h: "Цинк с кислотой и солью, углерод горит и восстанавливает медь, щелочь поглощает CO2." },
                { q: "Установите соответствие между веществом и реагентами:\nА) CaO, Б) CO2, В) HCl\n1) NaOH, Ca(OH)2\n2) Zn, AgNO3\n3) H2O, HNO3\n4) NaCl, O2", a: "312", h: "CaO с водой и кислотой, CO2 со щелочами, HCl с металлом и солью серебра." },
                { q: "Установите соответствие между веществом и реагентами:\nА) Cl2, Б) FeCl3, В) Na2SO4\n1) BaCl2, AgNO3\n2) KBr, H2\n3) NaOH, AgNO3\n4) HCl, CO2", a: "231", h: "Хлор вытесняет бром, хлорид железа дает осадки с щелочью и серебром, сульфат дает осадок с барием." },
                { q: "Установите соответствие между веществом и реагентами:\nА) Al2O3, Б) Na, В) H2SO4\n1) C, O2\n2) NaOH, HCl\n3) CuO, Ba(NO3)2\n4) H2O, Cl2", a: "243", h: "Al2O3 амфотерен, натрий бурно реагирует с водой, серная кислота — с оксидом меди и нитратом бария." }
            ]
        }
    ];

    function startApp() {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        // Собираем вариант: по 1 случайному вопросу из каждого из 10 типов
        sessionData = db.map(typeBlock => {
            const v = typeBlock.variants;
            return v[Math.floor(Math.random() * v.length)];
        });
        currentIdx = 0; score = 0;
        showQuestion();
    }

    function showQuestion() {
        const data = sessionData[currentIdx];
        document.getElementById('progress-text').innerText = `Задание ${currentIdx + 1} из 10`;
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('expl-box').classList.add('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-check').classList.remove('hidden');
        
        const container = document.getElementById('input-fields');
        container.innerHTML = '';
        // Создаем клетки в зависимости от длины ответа
        for(let i=0; i < data.a.length; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'oge-cell';
            input.maxLength = 1;
            input.id = `cell-${i}`;
            // Автопереход на следующую клетку
            input.oninput = function() { if(this.value && document.getElementById(`cell-${i+1}`)) document.getElementById(`cell-${i+1}`).focus(); };
            container.appendChild(input);
        }
    }

    document.getElementById('btn-check').onclick = function() {
        const data = sessionData[currentIdx];
        let userAns = "";
        for(let i=0; i < data.a.length; i++) userAns += document.getElementById(`cell-${i}`).value;
        
        // Типы с зеркальным вводом (1, 5, 6, 8)
        const mirroredTypes = [1, 5, 6, 8];
        let isCorrect = false;
        
        if (mirroredTypes.includes(currentIdx + 1)) {
            const sortStr = (s) => s.split('').sort().join('');
            isCorrect = sortStr(userAns) === sortStr(data.a);
        } else {
            isCorrect = userAns === data.a;
        }

        if(isCorrect) { score++; }
        
        const expl = document.getElementById('expl-box');
        expl.classList.remove('hidden');
        expl.innerHTML = isCorrect ? `<b style="color:var(--correct)">ВЕРНО! ✨</b><br>${data.h}` : 
                                     `<b style="color:var(--wrong)">ОШИБКА ❌</b><br>Правильный ответ: ${data.a}<br><small>${data.h}</small>`;
        
        this.classList.add('hidden');
        document.getElementById('btn-next').classList.remove('hidden');
    };

    document.getElementById('btn-next').onclick = function() {
        currentIdx++;
        if(currentIdx < sessionData.length) { showQuestion(); } 
        else {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}/10`;
            document.getElementById('feedback').innerText = score > 7 ? "Отличный результат! К ОГЭ готов." : "Нужно еще потренироваться!";
        }
    };
</script>
</body>
</html>
