<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPR-6: RANDOM GENERATOR</title>
    <style>
        :root { --gold: #ffd700; --deep-blue: #0b192e; --neon: #00f2ff; }
        body { background: var(--deep-blue); color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 20px; }
        .app-card { background: rgba(255,255,255,0.05); border: 2px solid var(--neon); border-radius: 15px; padding: 25px; width: 100%; max-width: 600px; box-shadow: 0 0 30px rgba(0,242,255,0.2); }
        h1 { color: var(--gold); text-align: center; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .task { background: rgba(0,0,0,0.3); margin-bottom: 15px; padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); }
        input { width: 100px; background: transparent; border: none; border-bottom: 2px solid var(--neon); color: var(--neon); font-size: 1.2rem; text-align: center; outline: none; }
        button { width: 100%; padding: 15px; background: var(--neon); color: var(--deep-blue); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        #results { margin-top: 20px; padding: 15px; text-align: center; border-radius: 8px; display: none; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="app-card">
    <h1>⚔️ VPR-6: RANDOM GENERATOR ⚔️</h1>
    <div id="quiz"></div>
    <button onclick="calculate()">ПРОВЕРИТЬ ЗНАНИЯ</button>
    <div id="results"></div>
    <button onclick="location.reload()" style="background: transparent; color: var(--neon); border: 1px solid var(--neon); margin-top: 10px;">НОВОЕ ИСПЫТАНИЕ</button>
</div>

<script>
    let currentAnswers = {};

    function generateTasks() {
        const quiz = document.getElementById('quiz');
        
        let a1 = Math.floor(Math.random() * 30) + 10;
        let b1 = Math.floor(Math.random() * 50) + 20;
        currentAnswers.q1 = (b1 - a1).toString();
        
        let den = Math.floor(Math.random() * 7) + 3;
        currentAnswers.q2 = `5/${den}`;

        let x = Math.floor(Math.random() * 10) + 5;
        let div = Math.floor(Math.random() * 4) + 2;
        currentAnswers.q3 = (x * div).toString();

        let d1 = (Math.random() * 2 + 1).toFixed(1);
        currentAnswers.q4 = (parseFloat(d1) * 2).toString().replace('.', ',');

        let total = (Math.floor(Math.random() * 10) + 1) * 50;
        currentAnswers.q5 = (total * 0.2).toString();

        quiz.innerHTML = `
            <div class="task"><p>1. Вычислите: -${a1} + ${b1}</p><input type="text" id="q1"></div>
            <div class="task"><p>2. Вычислите: 2/${den} + 3/${den}</p><input type="text" id="q2"></div>
            <div class="task"><p>3. Число уменьшили в ${div} раза и получили ${x}. Какое это было число?</p><input type="text" id="q3"></div>
            <div class="task"><p>4. Вычислите: ${d1.replace('.', ',')} * 2</p><input type="text" id="q4"></div>
            <div class="task"><p>5. Найдите 20% от числа ${total}</p><input type="text" id="q5"></div>
        `;
    }

    function calculate() {
        const getVal = (id) => document.getElementById(id).value.replace(/\s+/g, '').replace('.', ',');
        let score = 0;
        for (let key in currentAnswers) {
            if (getVal(key) === currentAnswers[key].replace('.', ',')) score++;
        }

        let mark = score < 3 ? 2 : (score === 3 ? 3 : (score === 4 ? 4 : 5));
        const resDiv = document.getElementById('results');
        resDiv.style.display = 'block';
        resDiv.innerHTML = `<h2>Результат: ${score} из 5</h2><p>Оценка: <strong>${mark}</strong></p>`;
    }

    generateTasks();
</script>
</body>
</html>
