<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPR-8 CHEMICAL VERSION</title>
    <style>
        .top-nav { position: fixed; top: 10px; left: 10px; z-index: 1000; display: flex; gap: 10px; }
        .nav-btn { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--h-green); 
            color: var(--h-green); padding: 5px 10px; font-size: 0.7rem; 
            text-decoration: none; text-transform: uppercase; cursor: pointer;
        }
        .nav-btn:hover { box-shadow: 0 0 10px var(--h-green); color: white; }
        :root { 
            --h-green: #457b3b; 
            --h-yellow: #f1c40f; 
            --bg-dark: #0a1108;
            --glass: rgba(69, 123, 59, 0.1);
        }
        
        body { 
            font-family: 'Courier New', monospace; 
            background: var(--bg-dark); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Дизайн заголовков в стиле BrBa */
        .br-ba-logo { font-size: 2.5rem; font-weight: bold; margin: 20px 0; color: white; }
        .element { background: var(--h-green); padding: 5px 12px; border: 1px solid #fff; display: inline-block; margin-right: -5px; }

        #auth {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px;
        }

        .input-group { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        input[type="text"], select { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--h-green); 
            color: var(--h-green); padding: 12px; font-size: 1.1rem; 
            text-align: center; outline: none; border-radius: 4px;
        }

        button {
            margin-top: 25px; background: transparent; 
            border: 2px solid var(--h-green); color: var(--h-green);
            padding: 15px 35px; cursor: pointer; font-family: inherit;
            text-transform: uppercase; font-weight: bold; letter-spacing: 2px;
            transition: 0.3s;
        }
        button:hover { background: var(--h-green); color: white; box-shadow: 0 0 20px var(--h-green); }

        #test-container { padding: 15px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        
        .task-card { 
            background: var(--glass); border-left: 5px solid var(--h-green); 
            padding: 20px; margin: 30px 0; border-radius: 0 10px 10px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .task-img { width: 100%; max-width: 500px; border: 1px solid var(--h-green); margin: 15px 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.3); }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; font-size: 0.85rem; }
        th { background: var(--h-green); color: white; }

        .opt-btn { 
            margin: 5px; padding: 10px; border: 1px solid var(--h-green); 
            background: transparent; color: var(--h-green); cursor: pointer;
        }
        .opt-btn.selected { background: var(--h-green); color: white; }

        .hidden { display: none !important; }
        
        #official-blank { 
            border: 10px double black; padding: 40px; text-align: center; 
            margin: 20px; background: #fff; color: #000; font-family: serif;
        }

        @media (max-width: 600px) {
            th, td { padding: 5px; font-size: 0.7rem; }
            .br-ba-logo { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="top-nav">
    <a href="https://walter-lgtm.github.io/loki-chemistry/periodic_bad.html" target="_blank" class="nav-btn">[ПСХЭ Heisenberg]</a>
    <a href="https://walter-lgtm.github.io/loki-chemistry/solubility_bad.html" target="_blank" class="nav-btn">[Растворимость]</a>
</div>
<div id="app">
    <div id="auth">
        <div class="br-ba-logo"><span class="element">V</span><span class="element">Pr</span>-8 Laboratory</div>
        <p style="color: var(--h-green);">PROPERTY OF WW LABORATORIES</p>
        <div class="input-group">
            <input type="text" id="userName" placeholder="ФИО УЧАСТНИКА" autocomplete="off">
            <input type="text" id="userClass" placeholder="КЛАСС (НАПР. 8Б)" autocomplete="off">
        </div>
        <button onclick="startTest()">Начать синтез</button>
    </div>

    <div id="test-container" class="hidden">
        <div id="quiz"></div>
        <button id="finish-btn" onclick="finishTest()" style="width: 100%; margin: 40px 0;">ФИКСИРОВАТЬ РЕЗУЛЬТАТ</button>
    </div>

    <div id="official-blank" class="hidden">
        <h2>СЕРТИФИКАТ ПРОХОЖДЕНИЯ ВПР-8</h2>
        <p>Настоящим подтверждается, что участник:</p>
        <h1 id="blank-fio"></h1>
        <h3 id="blank-class"></h3>
        <hr>
        <div id="result-status" style="font-size: 1.8rem; margin: 20px 0;"></div>
        <p id="blank-date"></p>
        <button onclick="window.print()" style="border: 2px solid #000; color: #000;">ПЕЧАТЬ ПРОТОКОЛА</button>
    </div>
</div>
<script>
let startTime;
// Путь к папке с картинками в твоем репозитории
const imgPath = "img/"; 

const pool = [
    // ТИП 1.1 и 1.2
    { 
        id: "1.1",
        q: "1.1. Укажите номер рисунка, на котором изображён объект, содержащий индивидуальное химическое вещество:<br><img src='"+imgPath+"1.1V.png' class='task-img'>", 
        type: "input", a: "3" 
    },
    {
        id: "1.2",
        q: "1.2. Заполните таблицу для остальных рисунков:",
        type: "table_select",
        rows: [
            { label: "Рисунок 1", options: ["медь", "вода", "азот", "железо"], a: "медь", formula_opts: ["Cu", "H2O", "N2", "Fe"], fa: "Cu" },
            { label: "Рисунок 2", options: ["медь", "вода", "азот", "железо"], a: "вода", formula_opts: ["Cu", "H2O", "N2", "Fe"], fa: "H2O" }
        ]
    },
    // ТИП 2.1 и 2.2
    {
        id: "2.1",
        q: "2.1. Выберите номер рисунка, на котором изображена химическая реакция:<br><img src='"+imgPath+"2.1V.png' class='task-img'>",
        type: "input", a: "3"
    },
    {
        id: "2.2",
        q: "2.2. Укажите один ЛЮБОЙ признак протекания этой реакции:",
        type: "choice",
        options: ["Выделение газа (выхлопных газов)", "Плавление льда", "Изменение формы", "Свечение лампочки"],
        a: "Выделение газа (выхлопных газов)"
    },
    // ТИП 3.1 и 3.2 (Добавлена нумерация № п/п)
    {
        id: "3.1",
        q: "3.1. Рассчитайте молярные массы веществ (г/моль):",
        type: "table_select_simple",
        rows: [
            { label: "1) O<sub>2</sub>", options: ["16", "32", "48", "64"], a: "32" },
            { label: "2) CH<sub>4</sub>", options: ["12", "14", "16", "18"], a: "16" },
            { label: "3) SO<sub>2</sub>", options: ["32", "48", "64", "80"], a: "64" }
        ]
    },
    {
        id: "3.2",
        q: "3.2. Каким газом из таблицы (3.1) следует наполнить шарик, чтобы он взлетел (M воздуха = 29)? Укажите номер:",
        type: "input", a: "2"
    },
    // ТИП 4
    {
        id: "4",
        q: "4. ПСХЭ Анализ. Элемент А (11 e-), Элемент В (16 e-). Заполните матрицу:",
        type: "matrix_heisenberg",
        rows: [
            { label: "А", opts: ["Натрий", "Магний", "Калий", "Сера"], a: "Натрий", per: ["1","2","3","4"], pa: "3", gr: ["I","II","III","VI"], ga: "I", type: ["Металл","Неметалл"], ta: "Металл", ox: ["Na2O", "MgO", "K2O", "SO3"], oa: "Na2O" },
            { label: "В", opts: ["Натрий", "Магний", "Калий", "Сера"], a: "Сера", per: ["1","2","3","4"], pa: "3", gr: ["I","II","III","VI"], ga: "VI", type: ["Металл","Неметалл"], ta: "Неметалл", ox: ["Na2O", "MgO", "K2O", "SO3"], oa: "SO3" }
        ]
    },
    // ТИП 5.1 и 5.2 (Добавлена таблица состава)
    { 
        id: "5.1", 
        q: "5.1. Михаил съел 60г горошка. Данные состава:<br><table><tr><th>Компонент</th><th>Белки</th><th>Жиры</th><th>Углеводы</th></tr><tr><td>Доля, %</td><td>35,0</td><td>0,4</td><td>40,5</td></tr></table><br>Определите массу белков (г), которую получил организм:", 
        type: "input", a: "21" 
    },
    { id: "5.2", q: "5.2. Какую долю (%) от суточной нормы (80г) составляет полученное количество белков?", type: "input", a: "26.3" },
    
    // ТИП 6.1 - 6.5
    {
        id: "6.1",
        q: "6.1. Выберите формулы для веществ:",
        type: "table_select_simple",
        rows: [
            { label: "Хлороводород", options: ["HCl", "H2", "Cl2", "ZnCl2"], a: "HCl" },
            { label: "Хлорид цинка", options: ["ZnCl", "ZnCl2", "ZnCl3", "Zn"], a: "ZnCl2" },
            { label: "Гидроксид железа(III)", options: ["FeOH", "Fe(OH)2", "Fe(OH)3", "Fe2O3"], a: "Fe(OH)3" },
            { label: "Оксид железа(III)", options: ["FeO", "Fe2O3", "Fe3O4", "Fe(OH)3"], a: "Fe2O3" }
        ]
    },
    { id: "6.2", q: "6.2. Пластичный серебристо-белый металл, хрупкий при комнатной t°:", type: "choice", options: ["Цинк", "Железо", "Медь", "Алюминий"], a: "Цинк" },
    { id: "6.3", q: "6.3. Выберите свойства для Fe<sub>2</sub>O<sub>3</sub>:", type: "choice", options: ["Основные", "Кислотные", "Амфотерные"], a: "Амфотерные" },
    { id: "6.4", q: "6.4. Массовая доля (%) кислорода в Fe(OH)<sub>3</sub>:", type: "input", a: "44.86" },
    { id: "6.5", q: "6.5. Сколько атомов в 0,25 моль цинка?", type: "choice", options: ["1,505*10^23", "6,02*10^23", "3,01*10^23", "1,2*10^24"], a: "1,505*10^23" },
    
    // ТИП 7.1 - 7.3
    {
        id: "7.1",
        q: "7.1. Выберите ДВА верных уравнения реакций (натрий+хлор и обмен магния):",
        type: "multi",
        options: ["2Na + Cl2 = 2NaCl", "Mg(NO3)2 + 2KOH = 2KNO3 + Mg(OH)2", "Fe + H2O = FeO + H2", "Cu + HCl = CuCl2"],
        a: ["2Na + Cl2 = 2NaCl", "Mg(NO3)2 + 2KOH = 2KNO3 + Mg(OH)2"]
    },
    { id: "7.2", q: "7.2. Укажите тип реакции (2) — нитрат магния и щелочь:", type: "choice", options: ["Соединение", "Разложение", "Замещение", "Обмен"], a: "Обмен" },
    { id: "7.3", q: "7.3. Выберите прибор для отделения Mg(OH)<sub>2</sub> от раствора:<br><img src='"+imgPath+"7.3V.png' class='task-img'>", type: "input", a: "2" },
    
    // ТИП 8 (Полный текст соответствия)
    {
        id: "8",
        q: "8. Установите соответствие (А-вода, Б-соляная к-та, В-алюминий, Г-водород):<br>1) авиация, 2) школьный мел, 3) травление металлов, 4) ракетное топливо, 5) полив растений.<br>Введите 4 цифры без пробелов:",
        type: "input", a: "5314"
    },
    // ТИП 9 (Полный текст суждений)
    { 
        id: "9", 
        q: "9. Верные суждения о ТБ:<br>1) Углекислый газ вызывает парниковый эффект.<br>2) Запрещено греть закрытую колбу.<br>3) Можно пробовать на вкус в лаборатории.<br>4) Можно хранить яды с едой.<br>Введите цифры без пробелов:", 
        type: "input", a: "12" 
    }
];
  function startTest() {
    const fio = document.getElementById('userName').value.trim();
    const uClass = document.getElementById('userClass').value.trim();
    if(!fio || !uClass) { alert("ДИРЕКТИВА: Введите ФИО и Класс!"); return; }
    
    startTime = Date.now();
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('test-container').classList.remove('hidden');
    
    const quizDiv = document.getElementById('quiz');
    quizDiv.innerHTML = "";
    
    pool.forEach((item, index) => {
        let html = `<div class="task-card"><p>${item.q}</p>`;
        
        if(item.type === "input") {
            html += `<input type="text" class="ans" data-id="${item.id}" data-correct="${item.a}" placeholder="Ответ...">`;
        } 
        else if(item.type === "choice") {
            html += `<div class="input-zone">` + item.options.map(o => 
                `<button class="opt-btn" onclick="selectSingle(this, '${item.id}')">${o}</button>`).join('') + 
                `<input type="hidden" class="ans" id="ans-${item.id}" data-id="${item.id}" data-correct="${item.a}"></div>`;
        }
        else if(item.type === "multi") {
            html += `<div class="input-zone">` + item.options.map(o => 
                `<button class="opt-btn" onclick="selectMulti(this, '${item.id}')">${o}</button>`).join('') + 
                `<input type="hidden" class="ans" id="ans-${item.id}" data-id="${item.id}" data-correct="${item.a.join('|')}"></div>`;
        }
        else if(item.type === "table_select") {
            html += `<table><tr><th>Объект</th><th>Название</th><th>Формула</th></tr>`;
            item.rows.forEach((r, i) => {
                html += `<tr><td>${r.label}</td>
                <td><select class="sub-ans" data-correct="${r.a}"><option value="">?</option>${r.options.map(o=>`<option value="${o}">${o}</option>`)}</select></td>
                <td><select class="sub-ans" data-correct="${r.fa}"><option value="">?</option>${r.formula_opts.map(o=>`<option value="${o}">${o}</option>`)}</select></td></tr>`;
            });
            html += `</table><input type="hidden" class="ans-table" data-id="${item.id}">`;
        }
        else if(item.type === "table_select_simple") {
            html += `<table>`;
            item.rows.forEach(r => {
                html += `<tr><td>${r.label}</td><td><select class="sub-ans" data-correct="${r.a}"><option value="">?</option>${r.options.map(o=>`<option value="${o}">${o}</option>`)}</select></td></tr>`;
            });
            html += `</table><input type="hidden" class="ans-table" data-id="${item.id}">`;
        }
        else if(item.type === "matrix_heisenberg") {
            html += `<table><tr><th>Эл.</th><th>Название</th><th>Пер.</th><th>Гр.</th><th>Тип</th><th>Оксид</th></tr>`;
            item.rows.forEach(r => {
                html += `<tr><td>${r.label}</td>
                <td><select class="sub-ans" data-correct="${r.a}"><option value="">?</option>${r.opts.map(o=>`<option value="${o}">${o}</option>`)}</select></td>
                <td><select class="sub-ans" data-correct="${r.pa}"><option value="">?</option>${r.per.map(o=>`<option value="${o}">${o}</option>`)}</select></td>
                <td><select class="sub-ans" data-correct="${r.ga}"><option value="">?</option>${r.gr.map(o=>`<option value="${o}">${o}</option>`)}</select></td>
                <td><select class="sub-ans" data-correct="${r.ta}"><option value="">?</option>${r.type.map(o=>`<option value="${o}">${o}</option>`)}</select></td>
                <td><select class="sub-ans" data-correct="${r.oa}"><option value="">?</option>${r.ox.map(o=>`<option value="${o}">${o}</option>`)}</select></td></tr>`;
            });
            html += `</table><input type="hidden" class="ans-table" data-id="${item.id}">`;
        }
        
        html += `</div>`;
        quizDiv.innerHTML += html;
    });
}

function selectSingle(btn, id) {
    btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('ans-'+id).value = btn.innerText;
}

function selectMulti(btn, id) {
    btn.classList.toggle('selected');
    const selected = Array.from(btn.parentElement.querySelectorAll('.opt-btn.selected')).map(b => b.innerText);
    document.getElementById('ans-'+id).value = selected.join('|');
}

function finishTest() {
    let score = 0;
    const inputs = document.querySelectorAll('.ans');
    const tables = document.querySelectorAll('.task-card table');

    // Проверка обычных полей и кнопок
    inputs.forEach(i => {
        let val = i.value.trim().replace(',', '.').toUpperCase();
        let corr = i.dataset.correct.toUpperCase();
        if(corr.includes('|')) { // для мульти-выбора
            let parts = corr.split('|');
            let userParts = val.split('|');
            if(parts.every(p => userParts.includes(p)) && parts.length === userParts.length) score++;
        } else if(val === corr) score++;
    });

    // Проверка таблиц
    tables.forEach(t => {
        let selects = t.querySelectorAll('select');
        let correctCount = 0;
        selects.forEach(s => { if(s.value === s.dataset.correct) correctCount++; });
        if(correctCount === selects.length) score++;
    });

    const fio = document.getElementById('userName').value.toUpperCase();
    const uClass = document.getElementById('userClass').value.toUpperCase();
    const timeSpent = Math.floor((Date.now() - startTime) / 1000);
    
    // Шкала ВПР (примерная для 19 баллов)
    let grade = 2;
    if(score >= 17) grade = 5; else if(score >= 13) grade = 4; else if(score >= 8) grade = 3;

    // СИНХРОНИЗАЦИЯ (ВСТАВЬ СВОЙ URL НИЖЕ)
    fetch('https://script.google.com/macros/s/AKfycbyFmUjreHlc_R6X2JLqCJMIxEQ2IJPbWXdR3WA6vci1eTr5nXOyyFQpNs7jEXAXRkbUBw/exec', {
        method: 'POST', mode: 'no-cors',
        body: JSON.stringify({fio: fio, uClass: uClass, score: score, grade: grade, time: timeSpent})
    });

    // Финал
    document.getElementById('test-container').classList.add('hidden');
    document.getElementById('official-blank').classList.remove('hidden');
    document.getElementById('blank-fio').innerText = fio;
    document.getElementById('blank-class').innerText = "КЛАСС: " + uClass;
    document.getElementById('blank-date').innerText = "Дата: " + new Date().toLocaleDateString();
    document.getElementById('result-status').innerHTML = `ИТОГ: ${score}/19 БАЛЛОВ | ОЦЕНКА: ${grade}`;
}
</script>
</body>
</html>
