<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL: IONIC BOND</title>
    <style>
        :root { --neon-green: #00ff9f; --neon-red: #ff0055; --bg-black: #050505; --cyber-blue: #00d4ff; }
        body { background: var(--bg-black); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* Consent Guard */
        #consent-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .modal-content { border: 2px solid var(--cyber-blue); padding: 30px; max-width: 500px; text-align: center; box-shadow: 0 0 20px var(--cyber-blue); background: #000; }
        
        /* Main UI */
        #auth { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .cyber-input { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 10px; margin: 10px; width: 300px; text-align: center; outline: none; }
        .cyber-btn { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 15px 30px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .cyber-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }
        
        .task-card { border: 1px solid #333; background: rgba(255,255,255,0.02); padding: 20px; margin: 20px auto; max-width: 800px; border-left: 5px solid var(--cyber-blue); }
        .atom-scheme { font-size: 1.5rem; color: var(--neon-green); letter-spacing: 10px; margin: 10px 0; }
        
        .hidden { display: none !important; }
        #final-report { background: #fff; color: #000; padding: 40px; border: 5px double #000; max-width: 800px; margin: 20px auto; }
        .answer-log { text-align: left; font-size: 0.9rem; margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<!-- Consent Modal -->
<div id="consent-modal">
    <div class="modal-content">
        <h2 style="color: var(--cyber-blue);">[SYSTEM ACCESS]</h2>
        <p>После выполнения всех заданий и получении результата Вы будете согласны с выставлением оценки в электронный журнал учителем?</p>
        <button class="cyber-btn" onclick="acceptConsent()">СОГЛАСЕН</button>
        <button class="cyber-btn" style="border-color: var(--neon-red); color: var(--neon-red);" onclick="location.reload()">НЕСОГЛАСЕН</button>
    </div>
</div>

<div id="app" class="hidden">
    <div id="auth">
        <h1 style="color: var(--neon-green); letter-spacing: 5px;">IONIC_BOND_v1.0</h1>
        <input type="text" id="userName" class="cyber-input" placeholder="ФИО ПОЛНОСТЬЮ" autocomplete="off">
        <input type="text" id="userClass" class="cyber-input" placeholder="КЛАСС" autocomplete="off">
        <button class="cyber-btn" onclick="startTest()">INITIALIZE_TEST</button>
    </div>

    <div id="test-container" class="hidden">
        <div id="quiz"></div>
        <button class="cyber-btn" onclick="finishTest()" style="width: 100%; margin: 20px 0;">TERMINATE_AND_SAVE</button>
    </div>

    <div id="final-report" class="hidden">
        <h2>ОТЧЕТ О ТЕСТИРОВАНИИ: ИОННАЯ СВЯЗЬ</h2>
        <p><b>ФИО:</b> <span id="report-fio"></span> | <b>Класс:</b> <span id="report-class"></span></p>
        <p><b>Результат:</b> <span id="report-score"></span> | <b>Оценка:</b> <span id="report-grade"></span></p>
        <p><b>Согласие на оценку:</b> ПОДТВЕРЖДЕНО</p>
        <div id="answer-log" class="answer-log"></div>
        <button class="no-print" onclick="window.print()">ПЕЧАТЬ (PDF)</button>
    </div>
</div>
<script>
  const atomPool = [
    { el: "Br (+35)", scheme: ") ) ) )", a: "28187" },
    { el: "Ba (+56)", scheme: ") ) ) ) ) )", a: "28181882" },
    { el: "Cu (+29)", scheme: ") ) ) )", a: "28181" },
    { el: "Na (+11)", scheme: ") ) )", a: "281" },
    { el: "Cl (+17)", scheme: ") ) )", a: "287" }
];

const latticePool = [
    { opts: ["1) BaO, K2O, NaOH", "2) H2O, ZnO, CO2", "3) К2О, Fe2O3, Н2O", "4) CO2, Al2O3, CaO"], a: "1" },
    { opts: ["1) NH3, NaCl, SO2", "2) LiF, MgCl2, KOH", "3) CaO, H2S, P2O5", "4) SiO2, KCl, NO2"], a: "2" },
    { opts: ["1) H2O, AlCl3, O2", "2) KBr, CO, Na2S", "3) CsCl, Na2O, Ca(OH)2", "4) MgO, Br2, CO2"], a: "3" },
    { opts: ["1) KI, Na2SO4, Li2O", "2) NO, FeO, CCl4", "3) HCl, BaCl2, S8", "4) NaF, NH3, SO3"], a: "1" }
];

// Функция сборки теста
function generateQuiz() {
    const randomAtom = atomPool[Math.floor(Math.random() * atomPool.length)];
    const randomLattice = latticePool[Math.floor(Math.random() * latticePool.length)];

    return [
        {
            id: 1,
            type: "match",
            q: "Задание 1. Установите соответствие (введите цифры по порядку АБВГ):<br>А) Катион; Б) Ион; В) Анион; Г) Атом.<br>1) нейтральная частица; 2) положительный ион; 3) заряженная частица; 4) отрицательный ион.",
            a: "2341"
        },
        {
            id: 2,
            type: "input",
            q: `Задание 2. Напишите распределение электронов для атома <b>${randomAtom.el}</b> по уровням: <b>${randomAtom.scheme}</b> (введите цифры без пробелов):`,
            a: randomAtom.a
        },
        {
            id: 3,
            type: "choice",
            q: "Задание 3. В схеме Э<sup>0</sup> + (8–n)ē → Э<sup>n-8</sup> переменная <b>n</b> — это:",
            opts: ["порядковый номер", "номер периода", "номер группы", "массовое число"],
            a: "номер группы"
        },
        {
            id: 4,
            type: "choice",
            q: "Задание 4. В каком ряду находятся вещества только с ионной кристаллической решёткой?",
            opts: randomLattice.opts,
            a: randomLattice.opts.find(o => o.startsWith(randomLattice.a))
        },
        {
            id: 5,
            type: "multi",
            q: "Задание 5. Выберите характеристики ионной кристаллической решётки (несколько вариантов):",
            opts: [
                "1. Твёрдые", "2. Жидкие", "3. Газообразные", "4. Тугоплавкие", 
                "5. Легкоплавкие", "6. Летучие", "7. Нелетучие", 
                "8. Проводят ток в растворах", "9. Не проводят ток", "10. Растворимы в воде"
            ],
            a: ["1. Твёрдые", "4. Тугоплавкие", "7. Нелетучие", "8. Проводят ток в растворах", "10. Растворимы в воде"]
        }
    ];
}
  let currentQuiz = [];

function acceptConsent() {
    document.getElementById('consent-modal').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
}

function startTest() {
    const fio = document.getElementById('userName').value.trim();
    const uClass = document.getElementById('userClass').value.trim();
    if(!fio || !uClass) { alert("ВВЕДИТЕ ДАННЫЕ!"); return; }

    currentQuiz = generateQuiz();
    const quizDiv = document.getElementById('quiz');
    quizDiv.innerHTML = "";

    currentQuiz.forEach((item, idx) => {
        let html = `<div class="task-card"><p>${item.q}</p>`;
        if(item.type === "input" || item.type === "match") {
            html += `<input type="text" class="cyber-input ans" data-idx="${idx}" placeholder="Ввод...">`;
        } else if(item.type === "choice") {
            html += item.opts.map(o => `<button class="cyber-btn" style="margin:5px;font-size:0.8rem;" onclick="selectSingle(this, ${idx})">${o}</button>`).join('');
            html += `<input type="hidden" class="ans" id="ans-${idx}">`;
        } else if(item.type === "multi") {
            html += item.opts.map(o => `<button class="cyber-btn" style="margin:5px;font-size:0.8rem;" onclick="selectMulti(this, ${idx})">${o}</button>`).join('');
            html += `<input type="hidden" class="ans" id="ans-${idx}">`;
        }
        html += `</div>`;
        quizDiv.innerHTML += html;
    });
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('test-container').classList.remove('hidden');
}

function selectSingle(btn, idx) {
    btn.parentElement.querySelectorAll('.cyber-btn').forEach(b => b.style.boxShadow = "none");
    btn.style.boxShadow = "0 0 15px var(--neon-green)";
    document.getElementById('ans-'+idx).value = btn.innerText;
}

function selectMulti(btn, idx) {
    btn.classList.toggle('selected-multi');
    btn.style.boxShadow = btn.classList.contains('selected-multi') ? "0 0 15px var(--cyber-blue)" : "none";
    const selected = Array.from(btn.parentElement.querySelectorAll('.selected-multi')).map(b => b.innerText);
    document.getElementById('ans-'+idx).value = selected.join('|');
}

function finishTest() {
    let score = 0;
    let logHTML = "";
    const inputs = document.querySelectorAll('.ans');

    inputs.forEach((input, i) => {
        let userVal = input.value.trim().toUpperCase();
        let correctVal = currentQuiz[i].a;
        let isCorrect = false;

        if (Array.isArray(correctVal)) {
            let userArr = userVal.split('|').sort();
            let corrArr = correctVal.map(v => v.toUpperCase()).sort();
            isCorrect = (JSON.stringify(userArr) === JSON.stringify(corrArr));
        } else {
            isCorrect = (userVal === correctVal.toUpperCase());
        }

        if(isCorrect) score++;
        logHTML += `<p>Задание ${i+1}: ${isCorrect ? '✅' : '❌'} (Ваш ответ: ${userVal || 'пусто'})</p>`;
    });

    const grade = (score === 5) ? 5 : (score === 4) ? 4 : (score === 3) ? 3 : 2;
    const fio = document.getElementById('userName').value.toUpperCase();
    const uClass = document.getElementById('userClass').value.toUpperCase();

    // Отправка в Google (С твоим новым столбцом Согласие)
    fetch('https://script.google.com/macros/s/AKfycby1toT2R6CtKQhM5GojHCfwGVqBezUNAgGZTnU1Ep6aUEpwwhVCRcZ_WR8bpHNJWeuA1Q/exec', {
        method: 'POST', mode: 'no-cors',
        body: JSON.stringify({fio, uClass, score, grade, consent: "ДА", station: "ION8"})
    });

    document.getElementById('test-container').classList.add('hidden');
    document.getElementById('final-report').classList.remove('hidden');
    document.getElementById('report-fio').innerText = fio;
    document.getElementById('report-class').innerText = uClass;
    document.getElementById('report-score').innerText = score + " / 5";
    document.getElementById('report-grade').innerText = grade;
    document.getElementById('answer-log').innerHTML = logHTML;
}
  </script>
</body>
</html>
