<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW | ORGANIC CHAIN TERMINAL</title>
    <style>
        :root { 
            --main-ice: #00f2ff; 
            --steel: #2c3e50; 
            --bg-dark: #0b0e14;
            --glass: rgba(0, 242, 255, 0.05);
            --alert-red: #ff3300;
        }
        
        body { 
            font-family: 'Courier New', monospace; 
            background: var(--bg-dark); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #auth {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px;
        }
        #auth h1 { color: var(--main-ice); letter-spacing: 5px; font-size: 2.2rem; margin-bottom: 5px; }
        .subtitle { color: #557; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 30px; }

        .input-group { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        input[type="text"] { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--main-ice); 
            color: var(--main-ice); padding: 12px; font-size: 1.1rem; 
            text-align: center; outline: none; transition: 0.3s;
            font-family: inherit;
        }
        input[type="text"]:focus { box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        .timer-display { 
            position: fixed; top: 15px; right: 15px; 
            color: var(--main-ice); font-size: 1.4rem; 
            background: rgba(11, 14, 20, 0.9); padding: 10px 20px; 
            border: 2px solid var(--main-ice); font-weight: bold;
            z-index: 1000; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .timer-alert { 
            color: var(--alert-red) !important; border-color: var(--alert-red) !important; 
            box-shadow: 0 0 15px rgba(255, 51, 0, 0.4) !important; animation: pulse 1s infinite; 
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        button.action-btn {
            margin-top: 25px; background: transparent; 
            border: 2px solid var(--main-ice); color: var(--main-ice);
            padding: 15px 35px; cursor: pointer; font-family: inherit;
            text-transform: uppercase; font-weight: bold; letter-spacing: 2px;
            transition: 0.3s;
        }
        button.action-btn:hover { background: var(--main-ice); color: var(--bg-dark); box-shadow: 0 0 20px var(--main-ice); }

        #test-container { padding: 15px; max-width: 900px; margin: 20px auto; width: 100%; box-sizing: border-box; }
        
        .task-card { 
            background: var(--glass); border-left: 5px solid var(--main-ice); 
            padding: 25px; margin: 30px 0; border-radius: 0 4px 4px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Блок ввода для букв цепочки */
        .chain-input-zone { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; max-width: 400px; }
        .chain-field { display: flex; align-items: center; gap: 10px; }
        .chain-letter { color: var(--main-ice); font-weight: bold; font-size: 1.2rem; min-width: 30px; }
        .chain-input { background: rgba(0,0,0,0.4); border: 1px solid #2c3e50; color: #fff; padding: 8px; width: 100%; outline: none; font-family: inherit; }
        .chain-input:focus { border-color: var(--main-ice); }

        .hidden { display: none !important; }
        
        #official-blank { 
            border: 10px double black; padding: 40px; text-align: center; 
            margin: 40px auto; background: #fff; color: #000; max-width: 800px;
        }
        .blank-title { font-family: serif; font-size: 1.8rem; letter-spacing: 1px; margin-bottom: 5px; }
        .blank-meta { font-family: monospace; font-size: 0.9rem; color: #444; margin-bottom: 30px; }

        @media (max-width: 600px) {
            #auth h1 { font-size: 1.6rem; }
        }
        @media print { .no-print { display: none !important; } #official-blank { margin: 0; border-width: 5px; } }
    </style>
</head>
<body>

<div id="app">
    <!-- ТАЙМЕР -->
    <div id="timer" class="timer-display hidden">[ 15:00 ]</div>

    <!-- ВХОД -->
    <div id="auth" class="no-print">
        <h1>STATION /10CHAIN</h1>
        <div class="subtitle">ORGANIC SYNTHESIS LABYRINTH</div>
        <div class="input-group">
            <input type="text" id="userName" placeholder="ФИО УЧАЩЕГОСЯ" autocomplete="off">
            <input type="text" id="userClass" placeholder="КЛАСС (НАПР. 10-А)" autocomplete="off">
        </div>
        <button class="action-btn" onclick="startTest()">Открыть терминал</button>
    </div>

    <!-- ТЕСТ -->
    <div id="test-container" class="hidden no-print">
        <div id="quiz"></div>
        <button id="finish-btn" class="action-btn" onclick="finishTest()" style="width: 100%; margin: 40px 0; background: var(--main-ice); color: var(--bg-dark);">ФИКСИРОВАТЬ СИНТЕЗ</button>
    </div>

    <!-- СЕРТИФИКАТ -->
    <div id="official-blank" class="hidden">
        <div class="blank-title">ПРОТОКОЛ ИДЕНТИФИКАЦИИ ОРГАНИЧЕСКИХ СУБСТАНЦИЙ</div>
        <div class="blank-meta">WW LABORATORIES // ГЕНЕТИЧЕСКИЙ ЛАБИРИНТ</div>
        <hr style="border: 1px solid #000;">
        <p style="margin-top: 30px;">Настоящим подтверждается, что исследователь:</p>
        <h1 id="blank-fio" style="font-family: serif; text-transform: uppercase; margin: 10px 0;"></h1>
        <h3 id="blank-class" style="font-family: monospace; letter-spacing: 2px;"></h3>
        
        <div id="result-status" style="font-size: 1.6rem; margin: 40px 0; font-family: serif; font-weight: bold; border: 2px solid #000; padding: 15px; display: inline-block;"></div>
        
        <p id="blank-date" style="font-family: monospace; font-size: 0.8rem; margin-top: 5px;"></p>
        <hr style="border: 0; border-top: 1px dashed #000; margin-top: 40px;">
        <p style="font-size: 0.7rem; color: #555;">Все стадии лабиринта заверены верификатором. Коэффициент чистоты: Zero Error.</p>
        <button class="action-btn no-print" onclick="window.print()" style="border-color: #000; color: #000; margin-top: 20px;">СОХРАНИТЬ В PDF</button>
    </div>
</div>
<script>
let startTime;
let timerInterval;

// База данных органических лабиринтов повышенной сложности (уровень ЕГЭ)
const pool = [
    {
        id: "1",
        text: "<b>Лабиринт №1.</b> Хлорметан обработали металлическим натрием и получили углеводород <b>А</b>. Продукт дегидрирования вещества А при температуре 500 °C в присутствии катализатора превратился в газ <b>B</b>. При пропускании газа B через воду в присутствии солей ртути(II) образовалось вещество <b>C</b>. Расшифруйте вещества:",
        letters: [
            { code: "A", label: "Вещество А:", a: "этан" },
            { code: "B", label: "Вещество B:", a: "этен|этилен" },
            { code: "C", label: "Вещество C:", a: "этаналь|уксусныйальдегид" }
        ]
    },
    {
        id: "2",
        text: "<b>Лабиринт №2.</b> Карбид кальция обработали водой и получили газ <b>A</b>. В результате тримеризации газа A над активированным углем при 600 °C образовался жидкий углеводород <b>B</b>. При взаимодействии вещества B с хлорметаном в присутствии хлорида алюминия получили вещество <b>C</b>. Расшифруйте вещества:",
        letters: [
            { code: "A", label: "Вещество А:", a: "ацетилен|этин" },
            { code: "B", label: "Вещество B:", a: "бензол" },
            { code: "C", label: "Вещество C:", a: "толуол|метилбензол" }
        ]
    },
    {
        id: "3",
        text: "<b>Лабиринт №3.</b> Этанол нагрели выше 140 °C в присутствии концентрированной серной кислоты и получили газ <b>A</b>. К газу А добавили хлороводород и выделилось вещество <b>B</b>. Полученное вещество B обработали водным раствором гидроксида калия при нагревании, в результате чего синтезировали вещество <b>C</b>. Расшифруйте вещества:",
        letters: [
            { code: "A", label: "Вещество А:", a: "этен|этилен" },
            { code: "B", label: "Вещество B:", a: "хлорэтан" },
            { code: "C", label: "Вещество C:", a: "этанол|этиловыйспирт" }
        ]
    },
    {
        id: "4",
        text: "<b>Лабиринт №4.</b> Натриевую соль уксусной кислоты сплавили с гидроксидом натрия и получили газ <b>A</b>. При нагревании газа А до 1500 °C образовался углеводород <b>B</b>. В результате гидратации вещества B по реакции Кучерова синтезировали вещество <b>C</b>. Расшифруйте вещества:",
        letters: [
            { code: "A", label: "Вещество А:", a: "метан" },
            { code: "B", label: "Вещество B:", a: "ацетилен|этин" },
            { code: "C", label: "Вещество C:", a: "этаналь|уксусныйальдегид" }
        ]
    },
    {
        id: "5",
        text: "<b>Лабиринт №5.</b> Пропанол-1 окислили оксидом меди(II) при нагревании и получили вещество <b>A</b>. При дальнейшем окислении вещества А аммиачным раствором оксида серебра образовалась соль, которую обработали соляной кислотой и выделили органическую кислоту <b>B</b>. К кислоте B добавили избыток метанола в присутствии катализатора и получили сложный эфир <b>C</b>. Расшифруйте вещества:",
        letters: [
            { code: "A", label: "Вещество А:", a: "пропаналь|пропионовыйальдегид" },
            { code: "B", label: "Вещество B:", a: "пропионоваякислота|пропановаякислота" },
            { code: "C", label: "Вещество C:", a: "метилпропионат|метилпропаноат" }
        ]
    }
];

function startTest() {
    const fio = document.getElementById('userName').value.trim();
    const uClass = document.getElementById('userClass').value.trim();

    if(!fio || !uClass) {
        alert("КРИТИЧЕСКАЯ ОШИБКА: Идентификация отклонена. Заполните ФИО и Класс.");
        return;
    }

    startTime = Date.now();
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('test-container').classList.remove('hidden');
    document.getElementById('timer').classList.remove('hidden');
    
    startTimer(900); // Таймер на 15 минут (15 * 60 = 900 сек)
    
    const quizDiv = document.getElementById('quiz');
    quizDiv.innerHTML = "";
    
    pool.forEach((item, index) => {
        let inputsHtml = "";
        
        item.letters.forEach(letter => {
            inputsHtml += `
                <div class="chain-field">
                    <span class="chain-letter">${letter.code}:</span>
                    <input type="text" class="chain-input ans-field" data-correct="${letter.a}" placeholder="Название на русском (ИЮПАК)..." autocomplete="off">
                </div>`;
        });

        quizDiv.innerHTML += `
            <div class="task-card" data-id="${item.id}">
                <p>${item.text}</p>
                <div class="chain-input-zone">${inputsHtml}</div>
            </div>`;
    });
}

function startTimer(duration) {
    let timer = duration, minutes, seconds;
    timerInterval = setInterval(function () {
        minutes = parseInt(timer / 60, 10);
        seconds = parseInt(timer % 60, 10);

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        const display = document.getElementById('timer');
        display.textContent = `[ ${minutes}:${seconds} ]`;

        if (timer <= 60) {
            display.classList.add('timer-alert');
        }

        if (--timer < 0) {
            clearInterval(timerInterval);
            alert("ВРЕМЯ ИСТЕКЛО! Система выполняет принудительную сдачу бланка.");
            finishTest();
        }
    }, 1000);
}

function finishTest() {
    clearInterval(timerInterval);
    document.getElementById('timer').classList.add('hidden');
    
    const cards = document.querySelectorAll('.task-card');
    let score = 0;

    cards.forEach(card => {
        const fields = card.querySelectorAll('.ans-field');
        let cardCorrect = 0;
        
        fields.forEach(field => {
            // Очистка ввода от пробелов, приведение к нижнему регистру и замена ё на е
            let userAns = field.value.trim().toLowerCase().replace(/\s+/g, '').replace(/ё/g, 'е');
            let corrVariants = field.dataset.correct.toLowerCase().replace(/ё/g, 'е').split('|');
            
            if (corrVariants.includes(userAns)) {
                cardCorrect++;
            }
        });
        
        // Балл за лабиринт ставится, только если ВСЕ три вещества (A, B, C) угаданы верно
        if (cardCorrect === fields.length) {
            score++;
        }
    });

    const fio = document.getElementById('userName').value.toUpperCase();
    const uClass = document.getElementById('userClass').value.toUpperCase();
    const timeSpent = Math.floor((Date.now() - startTime) / 1000);

    // КРИТЕРИЙ АБСОЛЮТНОЙ ЧИСТОТЫ: 5 только за 5 из 5. 4 = «4», 3 = «3», <3 = «2»
    const finalGrade = (score === 5) ? 5 : (score === 4) ? 4 : (score === 3) ? 3 : 2;

    // СИНХРОНИЗАЦИЯ С ТВОЕЙ ГУГЛ-ТАБЛИЦЕЙ (вставь URL своей новой таблицы)
    fetch('https://script.google.com/macros/s/AKfycbzHO10w65OlP1TzJqRPV65NSrph0L5oi2BLXM6cCGBfQ-47Y4N24wrv2hgQkzEkVhGK/exec', {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
            fio: fio,
            uClass: uClass,
            score: score,
            grade: finalGrade,
            time: timeSpent,
            station: '/10chain'
        })
    });

    document.getElementById('test-container').classList.add('hidden');
    const blank = document.getElementById('official-blank');
    blank.classList.remove('hidden');
    
    document.getElementById('blank-fio').innerText = fio;
    document.getElementById('blank-class').innerText = "КЛАСС: " + uClass;
    document.getElementById('blank-date').innerText = "ДАТА КОНТРОЛЯ: " + new Date().toLocaleDateString() + " // ВРЕМЯ РАСШИФРОВКИ: " + timeSpent + " сек.";
    document.getElementById('result-status').innerHTML = `ЭФФЕКТИВНОСТЬ: ${score} / 5 ЛАБИРИНТОВ<br>СТАТУС ТОЧНОСТИ: ОЦЕНКА ${finalGrade}`;
}
</script>
