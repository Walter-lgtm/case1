<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPR-TRAINER 8.0 | Carbon & Neon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>VPR-TRAINER <span class="neon-text">8.0</span></h1>
            <p class="subtitle">Химия 8 класс | Часть 1</p>
        </header>

        <div id="menu" class="card">
            <button onclick="startApp('study')" class="btn btn-neon-blue">Режим Обучения</button>
            <button onclick="startApp('test')" class="btn btn-neon-green">Режим Зачета</button>
        </div>

        <div id="quiz-container" class="hidden">
            <div class="stats">
                <span id="progress">Вопрос 1 из 5</span>
                <span id="score" class="hidden">Баллы: 0</span>
            </div>
            <div id="question-box" class="card">
                <!-- Сюда скрипт вставит контент -->
            </div>
            <div id="explanation" class="card explanation hidden"></div>
            <button id="next-btn" onclick="nextQuestion()" class="btn btn-next hidden">Далее</button>
            <button onclick="location.reload()" class="btn btn-exit">В меню</button>
        </div>

        <div id="result-screen" class="card hidden">
            <h2>Результат</h2>
            <div id="final-score" class="neon-text-big">0/10</div>
            <p id="grade-text"></p>
            <button onclick="location.reload()" class="btn btn-neon-blue">Повторить</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
