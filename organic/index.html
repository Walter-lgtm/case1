<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW | ORGANIC STATION</title>
    <style>
    :root { 
        --main-ice: #00f2ff; 
        --steel: #2c3e50; 
        --bg-dark: #0b0e14;
    }
    
    body { 
        font-family: 'Courier New', monospace; 
        background: var(--bg-dark); 
        color: white; 
        margin: 0; 
        padding: 0; 
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* Блок входа (центровка) */
    #auth {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        text-align: center;
    }

    #auth h1 { color: var(--main-ice); margin-bottom: 30px; font-size: 1.8rem; }

    /* Поля ввода */
    .input-group {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    input[type="text"] { 
        background: transparent; border: none; 
        border-bottom: 2px solid var(--main-ice); 
        color: var(--main-ice); font-size: 1.2rem; 
        text-align: center; outline: none; transition: 0.3s;
        width: 100%;
    }

    button {
        margin-top: 30px; background: transparent; 
        border: 1px solid var(--main-ice); color: var(--main-ice);
        padding: 15px 30px; cursor: pointer; font-family: inherit;
        text-transform: uppercase; letter-spacing: 2px;
    }

    button:hover { background: var(--main-ice); color: var(--bg-dark); }

    /* Контейнер теста */
    #test-container { padding: 15px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    
    .task-card { 
        background: rgba(255,255,255,0.05); border-left: 4px solid var(--main-ice); 
        padding: 15px; margin: 20px 0; 
    }

    @media (max-width: 600px) {
        #auth h1 { font-size: 1.4rem; }
        .task-card { font-size: 0.9rem; }
        #official-blank { padding: 15px; border-width: 2px; }
    }

    .hidden { display: none !important; }
    
    #official-blank { 
        border: 5px double black; padding: 30px; text-align: center; 
        margin: 20px; background: #fff; color: #000; 
    }
    </style>
</head>
<body>

<div id="app">
    <!-- ВХОД -->
    <div id="auth">
        <h1>STATION /ORGANIC</h1>
        <div class="input-group">
            <input type="text" id="userName" placeholder="ФИО ПОЛНОСТЬЮ" autocomplete="off">
            <input type="text" id="userClass" placeholder="КЛАСС (НАПР. 10-А)" autocomplete="off">
        </div>
        <button onclick="startTest()">ДЕЙСТВОВАТЬ ПО СХЕМЕ WW</button>
    </div>

    <!-- ТЕСТ -->
    <div id="test-container" class="hidden">
        <div id="quiz"></div>
        <button id="finish-btn" onclick="finishTest()" style="width: 100%;">ЗАВЕРШИТЬ ИСПЫТАНИЕ</button>
    </div>

    <!-- БЛАНК -->
    <div id="official-blank" class="hidden">
        <p>МИНИСТЕРСТВО ЦИФРОВЫХ ЛАБОРАТОРИЙ WW</p>
        <hr>
        <h2 id="blank-fio"></h2>
        <h3 id="blank-class"></h3>
        <div id="result-status" style="font-size: 1.5rem; margin: 20px 0;"></div>
        <p>СТАТУС: ПОДТВЕРЖДЕНО</p>
        <button onclick="window.print()">СОХРАНИТЬ В PDF</button>
    </div>
</div>

<script>
let startTime; // Фиксация времени запуска

const pool = [
    { q: "Введите код гибридизации атомов углерода в ПРОПЕНЕ (1-sp, 2-sp2, 3-sp3) по порядку от CH2=:", a: "223" },
    { q: "Введите код гибридизации атомов углерода в ЭТИНЕ (1-sp, 2-sp2, 3-sp3):", a: "11" },
    { q: "Введите код гибридизации для БЕНЗОЛА (все атомы):", a: "222222" },
    { q: "Сколько ТРЕТИЧНЫХ атомов углерода в 2-метилпропане?", a: "1" },
    { q: "Сколько ИЗОМЕРОВ имеет бутан (C4H10)?", a: "2" },
    { q: "Укажите число π-связей в молекуле бутадиена-1,3:", a: "2" },
    { q: "Сколько атомов углерода в главной цепи 3-этилгексана?", a: "6" },
    { q: "Сколько гидроксогрупп содержит этиленгликоль?", a: "2" },
    { q: "Введите число атомов кислорода в молекуле пропановой кислоты:", a: "2" },
    { q: "Число атомов водорода в молекуле циклогексана:", a: "12" },
    { q: "Коэффициент перед кислородом в реакции горения метана (CH4 + O2 → CO2 + H2O):", a: "2" },
    { q: "Сколько молекул водорода нужно для полного гидрирования 1 молекулы пропина?", a: "2" }
];

function startTest() {
    const fio = document.getElementById('userName').value.trim();
    const uClass = document.getElementById('userClass').value.trim();

    if(!fio || !uClass) {
        alert("ОШИБКА: Введите ФИО и Класс!");
        return;
    }

    if(localStorage.getItem('done_organic')) {
        alert("ДОСТУП ЗАБЛОКИРОВАН: Тест уже выполнен.");
        return;
    }

    startTime = Date.now(); // Запуск таймера
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('test-container').classList.remove('hidden');
    
    // Рандомизация 5 заданий
    const shuffled = pool.sort(() => 0.5 - Math.random()).slice(0, 5);
    const quizDiv = document.getElementById('quiz');
    quizDiv.innerHTML = "";
    
    shuffled.forEach((item, index) => {
        quizDiv.innerHTML += `<div class="task-card">
            <p>${index + 1}. ${item.q}</p>
            <input type="text" class="ans" data-correct="${item.a}" placeholder="Ответ...">
        </div>`;
    });
}

function finishTest() {
    const inputs = document.querySelectorAll('.ans');
    let score = 0;
    inputs.forEach(i => {
        if(i.value.trim() === i.dataset.correct) score++;
    });

    const fio = document.getElementById('userName').value.toUpperCase();
    const uClass = document.getElementById('userClass').value.toUpperCase();
    const finalGrade = (score === 5) ? 5 : (score === 4) ? 4 : (score === 3) ? 3 : 2;
    const timeSpent = Math.floor((Date.now() - startTime) / 1000);

    // Синхронизация с Google (Твой URL активен)
    fetch('https://script.google.com/macros/s/AKfycbyC6lxDWbGd7Yb0XRvbz0LeR5m6Vz0pCBH-rCgFMBkMifQd_I4Bj61rO6KJ1i8-jqo5WA/exec', {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
            fio: fio,
            uClass: uClass, // Добавлено поле класса
            score: score, 
            grade: finalGrade, 
            station: '/organic',
            time: timeSpent
        })
    });

    // Блокировка
    localStorage.setItem('done_organic', 'true');

    // Отрисовка официального бланка
    document.getElementById('test-container').classList.add('hidden');
    const blank = document.getElementById('official-blank');
    blank.classList.remove('hidden');
    
    document.getElementById('blank-fio').innerText = fio;
    document.getElementById('blank-class').innerText = "КЛАСС: " + uClass;
    document.getElementById('result-status').innerHTML = `Баллы: ${score} / 5 <br> Оценка: ${finalGrade} <br> Время: ${timeSpent} сек.`;
}
</script>
</body>
</html>
