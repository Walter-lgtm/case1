<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OGE-SCANNER | Professional Edition</title>
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --panel: #161b22; --border: #30363d; --success: #238636; }
        body { background: var(--bg); color: #c9d1d9; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 100%; max-width: 500px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { color: var(--accent); text-align: center; margin-bottom: 20px; text-transform: uppercase; font-size: 1.2rem; }
        .field-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #8b949e; }
        input, select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .grid-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; border-top: 1px solid var(--border); padding-top: 20px; }
        .grid-inputs input { text-align: center; padding: 8px; }
        .part2-box { background: rgba(88, 166, 255, 0.05); border: 1px dashed var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: var(--success); border: none; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        button:hover { background: #2ea043; transform: translateY(-1px); }
        #log { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; background: #0d1117; border: 1px solid var(--accent); }
        .total-score { font-size: 1.4rem; color: var(--accent); font-weight: bold; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>System Scanner: Chemistry</h2>
    <div class="field-group">
        <label>ФИО УЧАСТНИКА</label>
        <input type="text" id="fio" placeholder="Иванов Иван">
    </div>
    <div class="field-group">
        <label>ВАРИАНТ КИМ</label>
        <select id="variant">
            <option value="1">Вариант №1</option>
            <option value="2">Вариант №2</option>
        </select>
    </div>

    <div class="grid-inputs" id="answersGrid"></div>

    <div class="part2-box">
        <label>БАЛЛ ЗА ВТОРУЮ ЧАСТЬ (20–24)</label>
        <input type="number" id="part2_score" value="0" min="0" max="21">
    </div>

    <button onclick="processData()">РАССЧИТАТЬ И СОХРАНИТЬ</button>
    <div id="log"></div>
</div>

<script>
    const keys = {
        "1": ["25","166","312","211","25","24","23","12","214","423","25","412","45","35","211","123","334","13.9","21.6"],
        "2": ["23","41","132","431","34","13","15","13","231","341","24","141","35","14","221","34","223","34.8","0.17"]
    };

    // Группы заданий
    const flexible = [1, 5, 6, 8, 11, 13, 14, 16]; // Порядок не важен
    const twoPointTasks = [4, 9, 10, 12, 17];      // Вес 2 балла, важен порядок

    const grid = document.getElementById('answersGrid');
    for(let i=1; i<=19; i++) {
        grid.innerHTML += `<div><label>№${i}</label><input type="text" id="q${i}"></div>`;
    }

    function processData() {
        const fio = document.getElementById('fio').value || "Аноним";
        const variant = document.getElementById('variant').value;
        const part2 = parseInt(document.getElementById('part2_score').value) || 0;
        let p1_score = 0;

        keys[variant].forEach((key, i) => {
            const n = i + 1;
            let val = document.getElementById(`q${n}`).value.trim().replace(',', '.');

            // Правило: лишние символы = 0 баллов
            if (val.length > key.length && !twoPointTasks.includes(n)) {
                 return; 
            }

            if (twoPointTasks.includes(n)) {
                // Логика 2-балльных заданий (строгий порядок)
                if (val === key) {
                    p1_score += 2;
                } else if (val.length === key.length) {
                    let errors = 0;
                    for(let j=0; j<key.length; j++) if(val[j] !== key[j]) errors++;
                    if (errors === 1) p1_score += 1;
                }
            } else if (flexible.includes(n)) {
                // Логика зеркальности (сортировка)
                let sVal = val.split('').sort().join('');
                let sKey = key.split('').sort().join('');
                if (sVal === sKey && val.length === key.length) p1_score += 1;
            } else {
                // Обычные 1-балльные (1-3, 7, 18, 19)
                if (val === key) p1_score += 1;
            }
        });

        const total = p1_score + part2;
        const log = document.getElementById('log');
        log.style.display = 'block';
        log.innerHTML = `<div class="total-score">ИТОГ: ${total} БАЛЛОВ</div>
                         <div style="text-align:center; font-size:0.8rem; color:#8b949e">
                         (Ч1: ${p1_score} | Ч2: ${part2})</div>`;

        // Отправка (замени на свою ссылку)
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbyryV4AZdx1hgwf8QCjjNCadjpPKcoQ8xPew3u86s17dAIttjQF7_WJbhuKsEk_hdkP/exec'; 
        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ fio, variant, p1: p1_score, p2: part2, total, date: new Date().toLocaleString() })
        });
    }
</script>
</body>
</html>
