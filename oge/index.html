<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Тот самый тег для масштабируемости на смартфонах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OGE-SCANNER | PRO Mobile</title>
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --panel: #161b22; --border: #30363d; --success: #238636; }
        
        /* Адаптивный фон и шрифты */
        body { 
            background: var(--bg); 
            color: #c9d1d9; 
            font-family: -apple-system, system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 10px; /* Меньше отступ на мобиле */
            margin: 0; 
        }

        .container { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 20px; 
            width: 100%; 
            max-width: 500px; /* Ширина на десктопе */
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            box-sizing: border-box; 
        }

        h2 { color: var(--accent); text-align: center; font-size: 1.1rem; margin-bottom: 15px; }

        input, select { 
            width: 100%; 
            padding: 12px; /* Удобнее тыкать пальцем */
            background: var(--bg); 
            border: 1px solid var(--border); 
            color: #fff; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; /* Чтобы iOS не зумил поле при вводе */
        }

        /* Умная сетка: 4 колонки на ПК, 3 или 2 на мобиле */
        .grid-inputs { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); 
            gap: 8px; 
            margin: 15px 0; 
            border-top: 1px solid var(--border); 
            padding-top: 15px; 
        }

        .grid-inputs div { display: flex; flex-direction: column; align-items: center; }
        .grid-inputs label { font-size: 0.7rem; margin-bottom: 3px; color: #8b949e; }
        .grid-inputs input { text-align: center; padding: 8px 2px; }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--success); 
            border: none; 
            color: #fff; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem; 
            -webkit-appearance: none; /* Убирает дефолтные стили Сафари */
        }
    </style>
</head>
<body>
<div class="container">
    <h2>System Scanner: Chemistry</h2>
    <div class="field-group">
        <label>ФИО УЧАСТНИКА</label>
        <input type="text" id="fio" placeholder="Иванов Иван">
    </div>
    <div class="field-group">
        <label>ВАРИАНТ КИМ</label>
        <select id="variant">
            <option value="1">Вариант №1</option>
            <option value="2">Вариант №2</option>
        </select>
    </div>

    <div class="grid-inputs" id="answersGrid"></div>

    <div class="part2-box">
        <label>БАЛЛ ЗА ВТОРУЮ ЧАСТЬ (20–24)</label>
        <input type="number" id="part2_score" value="0" min="0" max="21">
    </div>

    <button onclick="processData()">РАССЧИТАТЬ И СОХРАНИТЬ</button>
    <div id="log"></div>
</div>

<script>
    const keys = {
        "1": ["25","166","312","211","25","24","23","12","214","423","25","412","45","35","211","123","334","13.9","21.6"],
        "2": ["23","41","132","431","34","13","15","13","231","341","24","141","35","14","221","34","223","34.8","0.17"]
    };

    // Группы заданий
    const flexible = [1, 5, 6, 8, 11, 13, 14, 16]; // Порядок не важен
    const twoPointTasks = [4, 9, 10, 12, 17];      // Вес 2 балла, важен порядок

    const grid = document.getElementById('answersGrid');
    for(let i=1; i<=19; i++) {
        grid.innerHTML += `<div><label>№${i}</label><input type="text" id="q${i}"></div>`;
    }

    function processData() {
        const fio = document.getElementById('fio').value || "Аноним";
        const variant = document.getElementById('variant').value;
        const part2 = parseInt(document.getElementById('part2_score').value) || 0;
        let p1_score = 0;

        keys[variant].forEach((key, i) => {
            const n = i + 1;
            let val = document.getElementById(`q${n}`).value.trim().replace(',', '.');

            // 1. Проверка на лишние символы (кроме 2-балльных, там своя логика)
            if (!twoPointTasks.includes(n) && val.length > key.length) {
                return; 
            }

            // 2. Логика 2-балльных заданий (4, 9, 10, 12, 17)
            if (twoPointTasks.includes(n)) {
                if (val === key) {
                    p1_score += 2;
                } else if (val.length === key.length) {
                    let errors = 0;
                    for(let j=0; j<key.length; j++) if(val[j] !== key[j]) errors++;
                    if (errors === 1) p1_score += 1;
                }
            } 
            // 3. Логика "зеркальности" (1, 5, 6, 8, 11, 13, 14, 16)
            else if (flexible.includes(n)) {
                let sVal = val.split('').sort().join('');
                let sKey = key.split('').sort().join('');
                if (sVal === sKey && val.length === key.length) p1_score += 1;
            } 
            // 4. Обычные 1-балльные
            else {
                if (val === key) p1_score += 1;
            }
        });

        // Итоговый расчет (Максимум 38 баллов)
        let total = p1_score + part2;
        if (total > 38) total = 38;

        // Шкала 2025/2026: 0-9(2), 10-20(3), 21-30(4), 31-38(5)
        let grade = 2;
        if (total >= 31) grade = 5;
        else if (total >= 21) grade = 4;
        else if (total >= 10) grade = 3;

        // Вывод на экран
        const log = document.getElementById('log');
        log.style.display = 'block';
        log.innerHTML = `
            <div class="total-score">ИТОГ: ${total} / 38</div>
            <div style="text-align:center; font-size:1.8rem; color:#58a6ff; margin:10px 0;">ОЦЕНКА: <b>${grade}</b></div>
            <div style="text-align:center; font-size:0.8rem; color:#8b949e">
            (Ч1: ${p1_score} | Ч2: ${part2})</div>
        `;

        // Отправка в Google Таблицу (обязательно обнови скрипт в самой таблице тоже!)
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbyryV4AZdx1hgwf8QCjjNCadjpPKcoQ8xPew3u86s17dAIttjQF7_WJbhuKsEk_hdkP/exec'; 
        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ 
                fio, 
                variant, 
                p1: p1_score, 
                p2: part2, 
                total, 
                grade, 
                date: new Date().toLocaleString() 
            })
        });
    }
</script>
</body>
</html>
